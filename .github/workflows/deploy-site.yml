name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Quartz (pinned v4.5.2)
        run: git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git .quartz

      - name: Inject content + config
        run: |
          rm -rf .quartz/content
          mkdir -p .quartz/content
          cp -r research/* .quartz/content/
          cp site/index.md .quartz/content/index.md
          cp site/quartz.config.ts .quartz/quartz.config.ts

      - name: Build site
        run: |
          cd .quartz
          npm ci
          npx quartz build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
